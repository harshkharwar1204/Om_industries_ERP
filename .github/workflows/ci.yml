name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      # Note: scripts/e2e.mjs and scripts/audit.mjs need a live dev server + .env
      # (Supabase). They are run locally/pre-deploy, not in CI.
